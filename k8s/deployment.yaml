apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-hub
  namespace: game-hub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: game-hub
  template:
    metadata:
      labels:
        app: game-hub
    spec:
      containers:
      - name: game-hub
        image: game-hub:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: game-hub
  namespace: game-hub
spec:
  selector:
    app: game-hub
  ports:
  - port: 80
    targetPort: 80
